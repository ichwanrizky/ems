name: Deploy to VPS

# Berjalan di self-hosted runner yang terpasang langsung di VPS Ubuntu.
# Tidak perlu SSH/secrets — runner sudah ada di dalam server.

on:
  push:
    branches:
      - master
  workflow_dispatch: # bisa di-trigger manual dari tab Actions

# Hindari dua deploy berjalan bersamaan (deploy terbaru menang)
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Reload (PM2)
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          set -e

          # Load runtime (runner berjalan sebagai service tanpa login shell,
          # jadi nvm & bun perlu di-load manual)
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          export PATH="$HOME/.bun/bin:$PATH"

          cd ~/ems

          echo "==> Pull kode terbaru"
          git fetch origin master
          git reset --hard origin/master

          echo "==> Install dependencies (pakai npm, lockfile = package-lock.json)"
          npm ci

          echo "==> Prisma (generate client + sync schema)"
          npx prisma generate
          npx prisma db push || true

          echo "==> Build Next.js"
          npm run build

          echo "==> Reload PM2 (start jika belum ada)"
          pm2 restart ems --update-env || pm2 start bun --name ems -- run start -p 8081
          pm2 save

          echo "==> Selesai"
          pm2 list
